name: Daily Music Generation

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Music category'
        required: false
        default: 'morning_coffee'
        type: choice
        options:
          - morning_coffee
          - meditation
          - sleep
          - study_focus
          - rainy_day

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            fluidsynth fluid-soundfont-gm ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --quiet midiutil requests

      - name: Pick category
        id: cat
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "category=${{ github.event.inputs.category }}" >> $GITHUB_OUTPUT
          else
            CATS=(morning_coffee meditation sleep study_focus rainy_day)
            DOW=$(date +%u)
            IDX=$(( (DOW - 1) % 5 ))
            echo "category=${CATS[$IDX]}" >> $GITHUB_OUTPUT
          fi

      - name: Generate music
        env:
          SOUNDFONT_PATH: /usr/share/sounds/sf2/FluidR3_GM.sf2
          OUTPUT_DIR: output
        run: |
          export HF_API_KEY="${{ secrets.HF_API_KEY }}"
          export PEXELS_API_KEY="${{ secrets.PEXELS_API_KEY }}"
          python generate.py --category ${{ steps.cat.outputs.category }} --no-upload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-${{ steps.cat.outputs.category }}-${{ github.run_number }}
          path: output/
          retention-days: 7