name: Daily Music Generation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: '생성할 카테고리'
        required: false
        default: 'morning_coffee'
        type: choice
        options:
          - morning_coffee
          - meditation
          - sleep
          - study_focus
          - rainy_day

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fluidsynth ffmpeg fluid-soundfont-gm

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Determine category
        id: cat
        run: |
          CATS=(morning_coffee meditation sleep study_focus rainy_day)
          DAY=$(date +%u)
          IDX=$(( (DAY - 1) % ${#CATS[@]} ))
          CAT="${{ github.event.inputs.category || '' }}"
          if [ -z "$CAT" ]; then
            CAT="${CATS[$IDX]}"
          fi
          echo "category=$CAT" >> $GITHUB_OUTPUT

      - name: Generate music (no upload)
        env:
          SOUNDFONT_PATH: /usr/share/sounds/sf2/FluidR3_GM.sf2
          OUTPUT_DIR: output
        run: |
          python generate.py --category ${{ steps.cat.outputs.category }} --no-upload

      - name: Save artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-${{ github.run_number }}
          path: output/
          retention-days: 7
